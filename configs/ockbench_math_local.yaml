# OckBench Math - Local Model Example (vLLM/SGLang)
# This config demonstrates benchmarking math problems using a local model server

# Dataset configuration
dataset_path: data/OckBench_math.jsonl
dataset_name: OckBench_math

# Model configuration
provider: generic  # Use generic for OpenAI-compatible APIs (vLLM, SGLang, etc.)
model: Qwen/Qwen3-4B  # Model name on the server
base_url: http://localhost:8000/v1  # vLLM/SGLang endpoint
api_key: dummy  # Many local servers don't need a real key

# Generation parameters
temperature: 0.0
max_context_window: 32768  # Match your model's context window
# max_output_tokens: null  # Will be calculated from max_context_window

# Runtime configuration
concurrency: 200  # Can be much higher for local serving
timeout: 3000  # Longer timeout for local models
max_retries: 2

# Evaluation configuration
evaluator_type: math
enforce_output_format: true  # Recommended: improves answer extraction accuracy

# Optional metadata
experiment_name: ockbench_math_qwen3_local
notes: Testing Qwen3-4B via local vLLM server on OckBench math problems

