# OckBench - Local Model (vLLM / SGLang, OpenAI-compatible server)
# Switch task by changing dataset_path and evaluator_type:
#   math:    data/OckBench_math.jsonl    + evaluator_type: math
#   coding:  data/OckBench_coding.jsonl  + evaluator_type: code
#   science: data/OckBench_science.jsonl + evaluator_type: science

dataset_path: data/OckBench_math.jsonl
dataset_name: OckBench_math
provider: chat_completion
model: Qwen/Qwen3-4B
api_key: dummy
base_url: http://localhost:8000/v1
temperature: 0.0
max_context_window: 40960
# Local vLLM/SGLang thinking toggle for Qwen3 via chat_template_kwargs.
request_overrides:
  set:
    extra_body.chat_template_kwargs.enable_thinking: true
concurrency: 200
timeout: 3000
max_retries: 2
evaluator_type: math
# Use the same local server as the math judge; disable its thinking so the
# verdict JSON comes back directly.
judge:
  model: Qwen/Qwen3-4B
  base_url: http://localhost:8000/v1
  api_key: dummy
  request_overrides:
    set:
      extra_body.chat_template_kwargs.enable_thinking: false
